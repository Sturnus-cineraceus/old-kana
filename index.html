<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>変体仮名変換</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="container">
    <h1>変体仮名変換</h1>

    <label for="input">入力</label>
    <textarea id="input" placeholder="ここに日本語テキストを入力"></textarea>

    <div class="controls">
      <button id="convert">変換</button>
    </div>

    <label for="output">出力</label>
    <textarea id="output" readonly placeholder="変換結果"></textarea>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
